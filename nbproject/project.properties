application.title=DrawMapTool
application.vendor=GirlkunTool
build.classes.dir=${build.dir}/classes
build.classes.excludes=**/*.java,**/*.form
# This directory is removed when the project is cleaned:
build.dir=build
build.generated.dir=${build.dir}/generated
build.generated.sources.dir=${build.dir}/generated-sources
build.sysclasspath=ignore
build.test.classes.dir=${build.dir}/test/classes
build.test.results.dir=${build.dir}/test/results
# Uncomment to specify the preferred debugger connection transport:
#debug.transport=dt_socket
debug.classpath=\
    ${run.classpath}
debug.modulepath=\
    ${run.modulepath}
debug.test.classpath=\
    ${run.test.classpath}
debug.test.modulepath=\
    ${run.test.modulepath}
# Files in build.classes.dir which should be excluded from distribution jar
dist.archive.excludes=
# This directory is removed when the project is cleaned:
dist.dir=dist
dist.jar=${dist.dir}/DrawMapTool.jar
dist.javadoc.dir=${dist.dir}/javadoc
excludes=
file.reference.flatlaf-1.6.jar=lib/flatlaf-1.6.jar
file.reference.flatlaf-intellij-themes-1.6.jar=lib/flatlaf-intellij-themes-1.6.jar
file.reference.girlkundb-1.0.0.jar=lib/girlkundb-1.0.0.jar
file.reference.json_simple-1.1.jar=lib/json_simple-1.1.jar
file.reference.mysql-connector-j-8.3.0.jar=lib/mysql-connector-j-8.3.0.jar
file.reference.TimingFramework-0.55.jar=lib/TimingFramework-0.55.jar
includes=**
jar.compress=false
javac.classpath=\
    ${file.reference.girlkundb-1.0.0.jar}:\
    ${file.reference.flatlaf-1.6.jar}:\
    ${file.reference.flatlaf-intellij-themes-1.6.jar}:\
    ${file.reference.json_simple-1.1.jar}:\
    ${file.reference.mysql-connector-j-8.3.0.jar}:\
    ${file.reference.TimingFramework-0.55.jar}
# Space-separated list of extra javac options
javac.compilerargs=
javac.deprecation=false
javac.external.vm=true
javac.modulepath=
javac.processormodulepath=
javac.processorpath=\
    ${javac.classpath}
javac.source=17
javac.target=17
javac.test.classpath=\
    ${javac.classpath}:\
    ${build.classes.dir}
javac.test.modulepath=\
    ${javac.modulepath}
javac.test.processorpath=\
    ${javac.test.classpath}
javadoc.additionalparam=
javadoc.author=false
javadoc.encoding=${source.encoding}
javadoc.noindex=false
javadoc.nonavbar=false
javadoc.notree=false
javadoc.private=false
javadoc.splitindex=true
javadoc.use=true
javadoc.version=false
javadoc.windowtitle=
main.class=com.girlkun.tool.main.Main
manifest.file=manifest.mf
meta.inf.dir=${src.dir}/META-INF
mkdist.disabled=false
platform.active=default_platform
run.classpath=\
    ${javac.classpath}:\
    ${build.classes.dir}
# Space-separated list of JVM arguments used when running the project.
# You may also define separate properties like run.jvmargs=-Xmx
run.jvmargs=
run.work.dir=.
run.modulepath=\
    ${javac.modulepath}
run.test.classpath=\
    ${javac.test.classpath}:\
    ${build.test.classes.dir}
run.test.modulepath=\
    ${javac.test.modulepath}
source.encoding=UTF-8
src.dir=src
test.src.dir=test
